document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

URA\",h:`<div class=\"fala\">\"Boa [manhã / tarde], <em>[NOME]<\u002Fem>! Aqui é a Diva, da Clínica Andreza Paz.<br><br>Estou entrando em contato <strong>mais uma vez<\u002Fstrong> porque realmente me preocupo com o(a) senhor(a).<br><br>Aquele procedimento — <em>[PROCEDIMENTO]<\u002Fem> — continua aberto aqui e queria saber como o(a) senhor(a) está.\"<\u002Fdiv>`},\n    {tp:\"\",lb:\"⏸ 2️⃣ ESCUTAR ATIVAMENTE (PNL)\",h:`<div class=\"blk-b\" style=\"padding:2px 0\"><strong>Silêncio estratégico.<\u002Fstrong> Deixe o paciente sentir que tem espaço para falar.<br>Se ele demonstrar dúvida → CAMINHO A.<br>Se demonstrar resistência → CAMINHO B.<\u002Fdiv>`},\n    {tp:\"gr\",lb:\"🟢 CAMINHO A — Paciente abre para reagendar\",h:`<div class=\"pbox\">\"Fico muito feliz em ouvir isso!<br><br>Então vou agendar a <strong>reavaliação gratuita<\u002Fstrong> do(a) senhor(a) agora mesmo.<br><br><strong>Amanhã ou na próxima semana?<\u002Fstrong> Qual dia funciona melhor?\"<\u002Fdiv>`},\n    {tp:\"ye\",lb:\"🟡 CAMINHO B — Paciente recusa o tratamento\",h:`<div class=\"dbox\">\"Compreendo, <em>[NOME]<\u002Fem>. Cada um tem seu tempo.<br><br>Mas deixa eu deixar duas portas abertas para o(a) senhor(a):<br><br>🏥 <strong>Reavaliação gratuita<\u002Fstrong> — sem custo, só para conversar.<br>💎 <strong>Limpeza por R$ 180,00<\u002Fstrong> — nossa promoção especial.<br><br>As duas opções continuam disponíveis!\"<\u002Fdiv>`},\n    {tp:\"bl\",lb:\"🔵 CAMINHO C — Já fez o procedimento em outro local\",h:`<div class=\"fala\">\"Que bom! O mais importante é estar cuidando.<br><br>💎 Aproveito para reforçar que nossa <strong>limpeza por R$ 180,00<\u002Fstrong> continua disponível.<br><br>Uma limpeza profissional a cada 6 meses faz toda diferença — e o(a) senhor(a) pode contar com a gente!\"<\u002Fdiv>`},\n    {tp:\"\",lb:\"🔚 ENCERRAMENTO\",h:`<div class=\"fala alt\">\"Obrigada, <em>[NOME]<\u002Fem>! Vou deixar a porta aberta por aqui.<br>Cuide-se muito bem!\"<\u002Fdiv>`},\n  ]},\n  4:{t:\"4ª Ligação — Quarta Tentativa (Need-Payoff)\",b:[\n    {tp:\"or\",lb:\"🧠 TÉCNICA: NEED-PAYOFF + ACOLHIMENTO (SPIN + PNL)\",h:`<div class=\"blk-b\" style=\"padding:2px 0\">Foco no <strong>benefício real<\u002Fstrong> da reavaliação. Valide a hesitação do paciente (PNL: <em>\"eu te entendo\"<\u002Fem>) antes de oferecer a solução.<\u002Fdiv>`},\n    {tp:\"bl\",lb:\"1️⃣ ABERTURA\",h:`<div class=\"fala\">\"Olá, <em>[NOME]<\u002Fem>! Aqui é a Diva, da Clínica Andreza Paz.<br><br>Sei que já liguei algumas vezes e peço desculpa pelo incômodo. É que realmente me importo com o(a) senhor(a) e não queria deixar essa oportunidade passar.\"<\u002Fdiv>`},\n    {tp:\"\",lb:\"⏸ 2️⃣ ESCUTAR ATIVAMENTE (PNL)\",h:`<div class=\"blk-b\" style=\"padding:2px 0\">Este é o momento de <strong>validar<\u002Fstrong> qualquer objeção: <em>\"Entendo perfeitamente, muita gente sente isso...\"<\u002Fem><br>Depois conduza com calma para um dos 3 caminhos.<\u002Fdiv>`},\n    {tp:\"gr\",lb:\"🟢 CAMINHO A — Paciente abre para reagendar\",h:`<div class=\"pbox\">\"Que ótima notícia! Fico muito feliz!<br><br>Então vamos agendar agora: a <strong>reavaliação é gratuita<\u002Fstrong>, o dentista examina sem compromisso, e o(a) senhor(a) decide depois.<br><br><strong>Amanhã ou semana que vem?<\u002Fstrong>\"<\u002Fdiv>`},\n    {tp:\"ye\",lb:\"🟡 CAMINHO B — Paciente recusa (SE PREOCUPA COM $$)\",h:`<div class=\"dbox\">\"Eu entendo perfeitamente, <em>[NOME]<\u002Fem>. Muita gente sente isso.<br><br>Por isso a <strong>reavaliação é 100% gratuita<\u002Fstrong> — o(a) senhor(a) não paga nada para vir. E temos <strong>parcelamento<\u002Fstrong> caso decida fazer algo.<br><br>💎 E a <strong>limpeza por R$ 180,00<\u002Fstrong> continua, caso queira só isso mesmo!\"<\u002Fdiv>`},\n    {tp:\"bl\",lb:\"🔵 CAMINHO C — Já fez o procedimento em outro local\",h:`<div class=\"fala\">\"Compreendo, e fico feliz que o(a) senhor(a) tenha resolvido!<br><br>💎 Se quiser <strong>manutenção<\u002Fstrong>, nossa <strong>limpeza por R$ 180,00<\u002Fstrong> continua disponível — é o melhor preço da região para um serviço profissional.<br><br>Fica o convite!\"<\u002Fdiv>`},\n    {tp:\"\",lb:\"🔚 ENCERRAMENTO\",h:`<div class=\"fala alt\">\"Obrigada, <em>[NOME]<\u002Fem>! Estarei aqui sempre que precisar.<br>Tenha um ótimo dia!\"<\u002Fdiv>`},\n  ]},\n  5:{t:\"5ª Ligação — Última Tentativa (Encerramento Positivo)\",b:[\n    {tp:\"or\",lb:\"🧠 TÉCNICA: ÚLTIMO CONTATO + PORTA ABERTA (PNL)\",h:`<div class=\"blk-b\" style=\"padding:2px 0\">Encerre sem frustração. Deixe o paciente com uma <strong>boa lembrança<\u002Fstrong> — isso aumenta a chance de ele voltar espontaneamente no futuro.<\u002Fdiv>`},\n    {tp:\"bl\",lb:\"1️⃣ ABERTURA\",h:`<div class=\"fala\">\"Olá, <em>[NOME]<\u002Fem>! Aqui é a Diva da Clínica Andreza Paz.<br><br>Esta é minha <strong>última ligação<\u002Fstrong> sobre o tratamento, mas queria muito conversar com o(a) senhor(a) uma última vez.<br><br>Está tudo bem com o(a) senhor(a)?\"<\u002Fdiv>`},\n    {tp:\"\",lb:\"⏸ 2️⃣ ESCUTAR ATIVAMENTE (PNL)\",h:`<div class=\"blk-b\" style=\"padding:2px 0\"><strong>Última chance de ouvir.<\u002Fstrong> Dê tempo, não pressione.<br>Se houver qualquer abertura → CAMINHO A.<br>Caso contrário, encerre com carinho.<\u002Fdiv>`},\n    {tp:\"gr\",lb:\"🟢 CAMINHO A — Paciente abre para reagendar\",h:`<div class=\"pbox\">\"Que felicidade saber disso!<br><br>Vamos agendar a <strong>reavaliação gratuita<\u002Fstrong> agora mesmo.<br><br><strong>Amanhã já consigo encaixar, ou prefere semana que vem?<\u002Fstrong>\"<\u002Fdiv>`},\n    {tp:\"ye\",lb:\"🟡 CAMINHO B — Paciente recusa o tratamento\",h:`<div class=\"dbox\">\"Respeito totalmente a decisão do(a) senhor(a), <em>[NOME]<\u002Fem>.<br><br>Mas saiba que as portas da clínica continuam abertas:<br><br>🏥 <strong>Reavaliação gratuita<\u002Fstrong> a qualquer momento.<br>💎 <strong>Limpeza por R$ 180,00<\u002Fstrong> sempre disponível.<br><br>Se mudar de ideia, é só me ligar!\"<\u002Fdiv>`},\n    {tp:\"bl\",lb:\"🔵 CAMINHO C — Já fez o procedimento em outro local\",h:`<div class=\"fala\">\"Fico feliz pelo(a) senhor(a)! O importante é cuidar da saúde.<br><br>💎 Para <strong>manutenção<\u002Fstrong> futura, nossa <strong>limpeza por R$ 180,00<\u002Fstrong> está sempre aqui.<br><br>Conte com a gente quando precisar!\"<\u002Fdiv>`},\n    {tp:\"\",lb:\"🔚 ENCERRAMENTO COM CARINHO\",h:`<div class=\"fala alt\">\"Cuide-se muito bem, <em>[NOME]<\u002Fem>! Obrigada pela atenção de sempre.<br><br>A <strong>Clínica Andreza Paz<\u002Fstrong> estará sempre de braços abertos quando o(a) senhor(a) quiser voltar.<br><br>Tenha um lindo dia! 😊\"<\u002Fdiv>`},\n  ]},\n};\n\nfunction load(){try{const s=localStorage.getItem('clv6');if(s)return JSON.parse(s);}catch(e){}return INIT.map(p=>({...p,col:'ligar',tent:0,obs:'',res:null,dt:null}));}\nfunction save(){localStorage.setItem('clv6',JSON.stringify(E));}\nlet E=load(),tN=1,pA=null,fId=null;\n\nfunction render(){\n  const q=(document.querySelector('.ksrch')?.value||'').toLowerCase();\n  const C={ligar:[],contato:[],agendado:[],final:[]};\n  E.forEach(p=>{if(!q||p.nome.toLowerCase().includes(q))C[p.col]?.push(p);});\n  const ids={ligar:'c1',contato:'c2',agendado:'c3',final:'c4'};\n  ['ligar','contato','agendado','final'].forEach(c=>{\n    document.getElementById(ids[c]).textContent=E.filter(p=>p.col===c).length;\n    const el=document.getElementById('col-'+c);\n    el.innerHTML=C[c].length?C[c].map(p=>mkC(p)).join(''):`<div class=\"empty-c\">Nenhum paciente aqui<\u002Fdiv>`;\n  });\n  document.getElementById('ki1').textContent=E.filter(p=>p.col==='contato').length;\n  document.getElementById('ki2').textContent=E.filter(p=>p.col==='agendado').length;\n  document.getElementById('ki3').textContent=E.filter(p=>p.col==='final').length;\n}\n\nfunction mkC(p){\n  const sel=pA?.id===p.id?'sel':'';\n  let d=`<div class=\"trow\"><span class=\"tlb\">Tent.:<\u002Fspan>`;\n  for(let i=1;i<=5;i++){const c=i<=p.tent?'dn':(i===p.tent+1?'nx':'');d+=`<div class=\"dot ${c}\" onclick=\"mT(${p.id},${i},event)\">${i}<\u002Fdiv>`;}\n  d+=`<\u002Fdiv>`;\n  let chip='';\n  if(p.res){const m={agendou:['bag','Agendou'],procedimento:['bpr','Já Realizou'],'sem-interesse':['bsi','Sem Interesse'],'sem-resposta':['bsr','Sem Resposta']};const[cl,lb]=m[p.res]||['',''];chip=`<span class=\"bdg ${cl}\" style=\"display:inline-block;margin-bottom:4px\">${lb}<\u002Fspan><br>`;}\n  let b='';\n  if(p.col==='ligar')b=`<button class=\"cb cbo\" onclick=\"mv(${p.id},'contato',event)\">Em Contato<\u002Fbutton><button class=\"cb cbg\" onclick=\"mv(${p.id},'agendado',event)\">Agendar<\u002Fbutton><button class=\"cb cbgr\" onclick=\"oM(${p.id},event)\">Finalizar<\u002Fbutton>`;\n  else if(p.col==='contato')b=`<button class=\"cb cbg\" onclick=\"mv(${p.id},'agendado',event)\">Agendar<\u002Fbutton><button class=\"cb cbgr\" onclick=\"oM(${p.id},event)\">Finalizar<\u002Fbutton><button class=\"cb cbb\" onclick=\"mv(${p.id},'ligar',event)\">↩ Voltar<\u002Fbutton>`;\n  else if(p.col==='agendado')b=`<button class=\"cb cbgr\" onclick=\"oM(${p.id},event)\">Finalizar<\u002Fbutton><button class=\"cb cbo\" onclick=\"mv(${p.id},'contato',event)\">↩ Em Contato<\u002Fbutton>`;\n  else b=`<button class=\"cb cbb\" onclick=\"mv(${p.id},'ligar',event)\">↩ Reabrir<\u002Fbutton>`;\n  return `<div class=\"card ${sel}\" onclick=\"sP(${p.id})\"><div class=\"cn\">${p.nome}<\u002Fdiv><div class=\"ct\">📱 ${p.tel}<\u002Fdiv><span class=\"cp2\">${p.proc}<\u002Fspan><div class=\"cv\">${p.valor}<\u002Fdiv>${d}${chip}<textarea class=\"cobs\" placeholder=\"Anotações...\" onclick=\"event.stopPropagation()\" onchange=\"sO(${p.id},this.value)\">${p.obs||''}<\u002Ftextarea><div class=\"cbtns\">${b}<\u002Fdiv><\u002Fdiv>`;\n}\n\nfunction mv(id,col,e){e?.stopPropagation();const p=E.find(x=>x.id===id);if(p){p.col=col;save();render();}}\nfunction mT(id,n,e){\n  e?.stopPropagation();const p=E.find(x=>x.id===id);if(!p)return;\n  if(n===p.tent)p.tent--;else if(n===p.tent+1){p.tent=n;if(p.col==='ligar')p.col='contato';}\n  tN=Math.max(1,p.tent+1);\n  document.querySelectorAll('.tbtn').forEach((b,i)=>b.classList.toggle('on',i+1===tN));\n  save();render();if(pA?.id===id){pA=E.find(x=>x.id===id);updS();}\n}\nfunction sO(id,v){const p=E.find(x=>x.id===id);if(p){p.obs=v;save();}}\nfunction sP(id){pA=E.find(x=>x.id===id);tN=Math.max(1,(pA.tent||0)+1);document.querySelectorAll('.tbtn').forEach((b,i)=>b.classList.toggle('on',i+1===tN));render();updP();}\nfunction selT(n){tN=n;document.querySelectorAll('.tbtn').forEach((b,i)=>b.classList.toggle('on',i+1===n));updS();}\nfunction updP(){\n  const el=document.getElementById('pbar');if(!pA)return;\n  el.classList.remove('empty');\n  el.innerHTML=`<span class=\"mi\" style=\"color:var(--cp)\">person<\u002Fspan><div><strong>${pA.nome}<\u002Fstrong><span>${pA.proc} · ${pA.valor} · ${pA.tent} tentativa(s)<\u002Fspan><\u002Fdiv>`;\n  updS();\n}\nfunction updS(){\n  const el=document.getElementById('sbody');const r=ROT[tN];\n  const nm=pA?pA.nome.split(' ')[0]:'[NOME]';\n  const pr=pA?pA.proc:'[PROCEDIMENTO]';\n  let h=`<div class=\"rt\">${r.t}<\u002Fdiv>`;\n  r.b.forEach(b=>{let t=b.h.replace(/\\[NOME\\]/g,`<em>${nm}<\u002Fem>`).replace(/\\[PROCEDIMENTO\\]/g,`<em>${pr}<\u002Fem>`);h+=`<div class=\"blk ${b.tp}\"><div class=\"blk-l\">${b.lb}<\u002Fdiv><div class=\"blk-b\">${t}<\u002Fdiv><\u002Fdiv>`;});\n  el.innerHTML=h;el.scrollTop=0;\n}\n\nfunction oM(id,e){e?.stopPropagation();fId=id;const p=E.find(x=>x.id===id);document.getElementById('mp').textContent=`Paciente: ${p.nome}`;document.getElementById('modal').classList.add('on');}\nfunction fModal(){document.getElementById('modal').classList.remove('on');fId=null;}\nfunction conf(res){\n  const p=E.find(x=>x.id===fId);\n  if(p){p.col='final';p.res=res;p.dt=new Date().toLocaleDateString('pt-BR');save();render();\n    if(pA?.id===p.id){pA=null;const el=document.getElementById('pbar');el.classList.add('empty');el.innerHTML='<span class=\"mi\" style=\"color:var(--cp)\">touch_app<\u002Fspan><div><strong>Nenhum paciente selecionado<\u002Fstrong><span>Clique em um cartão ao lado<\u002Fspan><\u002Fdiv>';}}\n  fModal();\n}\n\nfunction trocarAba(i,b){\n  document.querySelectorAll('.tab-btn').forEach((x,j)=>x.classList.toggle('on',j===i));\n  document.querySelectorAll('.pg').forEach((x,j)=>x.classList.toggle('on',j===i));\n  if(i===1)rel();\n}\n\nfunction rel(){\n  const tot=E.length,fin=E.filter(p=>p.col==='final');\n  const ag=fin.filter(p=>p.res==='agendou').length,si=fin.filter(p=>p.res==='sem-interesse').length,\n        sr=fin.filter(p=>p.res==='sem-resposta').length,pr=fin.filter(p=>p.res==='procedimento').length;\n  const and=E.filter(p=>['ligar','contato','agendado'].includes(p.col)).length;\n  const lig=E.reduce((a,p)=>a+p.tent,0),tx=fin.length?Math.round((ag/fin.length)*100):0;\n  const pct=n=>tot?Math.round((n/tot)*100):0;\n  const br=(lb,n,cor)=>`<div class=\"brow\"><span>${lb}<\u002Fspan><div class=\"btrack\"><div class=\"bfill\" style=\"width:${pct(n)}%;background:${cor}\"><\u002Fdiv><\u002Fdiv><span class=\"bnum\">${n}<\u002Fspan><\u002Fdiv>`;\n  const rows=[...E].sort((a,b)=>{const o={final:0,agendado:1,contato:2,ligar:3};return(o[a.col]??9)-(o[b.col]??9);}).map(p=>{\n    const cm={final:{agendou:'bag','sem-interesse':'bsi','sem-resposta':'bsr',procedimento:'bpr'},agendado:'bag',contato:'',ligar:''};\n    const lm={final:{agendou:'Agendou','sem-interesse':'Sem Interesse','sem-resposta':'Sem Resposta',procedimento:'Já Realizou'},agendado:'Agendado',contato:'Em Contato',ligar:'Para Ligar'};\n    const cc=p.col==='final'?(cm.final[p.res]||''):cm[p.col]||'';\n    const cl=p.col==='final'?(lm.final[p.res]||'Finalizado'):lm[p.col];\n    return `<tr><td style=\"font-weight:500\">${p.nome}<\u002Ftd><td>${p.proc}<\u002Ftd><td style=\"font-weight:700;color:var(--csu)\">${p.valor}<\u002Ftd><td style=\"text-align:center\">${p.tent}<\u002Ftd><td><span class=\"bdg ${cc}\">${cl}<\u002Fspan><\u002Ftd><td style=\"color:var(--cts)\">${p.dt||'—'}<\u002Ftd><\u002Ftr>`;\n  }).join('');\n  document.getElementById('rbody').innerHTML=`\n    <div class=\"rh\"><span class=\"mi\" style=\"color:var(--cp)\">bar_chart<\u002Fspan> Relatório da Diva — Retorno de Pacientes<\u002Fdiv>\n    <button class=\"breset\" onclick=\"resetar()\"><span class=\"mi\" style=\"font-size:15px\">warning<\u002Fspan> Resetar todos os dados<\u002Fbutton>\n    <div class=\"kgrid\">\n      <div class=\"kcard kcdb\"><span class=\"kl\">Total<\u002Fspan><span class=\"kv\">${tot}<\u002Fspan><span class=\"ks\">Pacientes<\u002Fspan><\u002Fdiv>\n      <div class=\"kcard kcye\"><span class=\"kl\">Em Andamento<\u002Fspan><span class=\"kv\">${and}<\u002Fspan><span class=\"ks\">Pacientes<\u002Fspan><\u002Fdiv>\n      <div class=\"kcard kcgr\"><span class=\"kl\">Agendaram<\u002Fspan><span class=\"kv\">${ag}<\u002Fspan><span class=\"ks\">Pacientes<\u002Fspan><\u002Fdiv>\n      <div class=\"kcard kcy\"><span class=\"kl\">Finalizados<\u002Fspan><span class=\"kv\">${fin.length}<\u002Fspan><span class=\"ks\">Contatos<\u002Fspan><\u002Fdiv>\n      <div class=\"kcard kcgr\"><span class=\"kl\">Conversão<\u002Fspan><span class=\"kv\">${tx}%<\u002Fspan><span class=\"ks\">dos finalizados<\u002Fspan><\u002Fdiv>\n      <div class=\"kcard kcbl\"><span class=\"kl\">Ligações<\u002Fspan><span class=\"kv\">${lig}<\u002Fspan><span class=\"ks\">Total feitas<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"ccard\">\n      <div class=\"ccard-hd\"><h3>Distribuição dos Pacientes<\u002Fh3><\u002Fdiv>\n      ${br('Para Ligar',E.filter(p=>p.col==='ligar').length,'#7E57C2')}\n      ${br('Em Contato',E.filter(p=>p.col==='contato').length,'var(--cfu)')}\n      ${br('Agendados',E.filter(p=>p.col==='agendado').length,'var(--cag)')}\n      ${br('Agendou',ag,'var(--cag)')}\n      ${br('Já Realizou',pr,'var(--cop)')}\n      ${br('Sem Interesse',si,'var(--cre)')}\n      ${br('Sem Resposta',sr,'#9E9E9E')}\n    <\u002Fdiv>\n    <div class=\"twrap\">\n      <table><thead><tr><th>Paciente<\u002Fth><th>Procedimento<\u002Fth><th>Valor<\u002Fth><th>Tentativas<\u002Fth><th>Status<\u002Fth><th>Data<\u002Fth><\u002Ftr><\u002Fthead>\n      <tbody>${rows}<\u002Ftbody><\u002Ftable>\n    <\u002Fdiv>`;\n}\n\nfunction resetar(){if(confirm('Apagar todo o progresso?')){localStorage.removeItem('clv6');E=load();pA=null;render();updS();}}\n\nrender();updS();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
