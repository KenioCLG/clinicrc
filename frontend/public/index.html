<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ClinicRC — Acesso</title>
<meta name="description" content="Plataforma de retorno ativo de pacientes para clínicas odontológicas."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet"/>
<style>
  /* ── RESET ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }

  /* ── MATERIAL SYMBOLS ── */
  .icon {
    font-family: 'Material Symbols Rounded';
    font-weight: normal;
    font-style: normal;
    font-size: 20px;
    line-height: 1;
    letter-spacing: normal;
    text-transform: none;
    display: inline-block;
    white-space: nowrap;
    word-wrap: normal;
    direction: ltr;
    -webkit-font-feature-settings: 'liga';
    -webkit-font-smoothing: antialiased;
    font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    user-select: none;
  }

  /* ── TOKENS ── */
  :root {
    --orange:      #EC6726;
    --orange-dark: #c94f1a;
    --orange-glow: rgba(236,103,38,.35);
    --bg:          #0d1117;
    --surface:     rgba(255,255,255,.04);
    --border:      rgba(255,255,255,.09);
    --border-focus:rgba(236,103,38,.55);
    --text:        #eaeaea;
    --text-muted:  rgba(255,255,255,.38);
    --text-dim:    rgba(255,255,255,.22);
    --err-bg:      rgba(239,68,68,.1);
    --err-border:  rgba(239,68,68,.3);
    --err-text:    #fca5a5;
  }

  /* ── BODY ── */
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    position: relative;
    overflow: hidden;
  }

  /* ── BACKGROUND ORBS ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 15% 20%, rgba(236,103,38,.18) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 85% 80%, rgba(120,60,200,.12) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 50% 50%, rgba(236,103,38,.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,.018) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.018) 1px, transparent 1px);
    background-size: 56px 56px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── WRAPPER ── */
  .wrapper {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 400px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    animation: fadeUp .5s cubic-bezier(.16,1,.3,1) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── LOGO ── */
  .logo {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-box {
    width: 50px; height: 50px;
    background: linear-gradient(140deg, #f07830 0%, var(--orange-dark) 100%);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 0 1px rgba(236,103,38,.35), 0 8px 28px var(--orange-glow);
    flex-shrink: 0;
  }

  .logo-box .icon { font-size: 26px; color: #fff; }

  .logo-info h1 {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -.4px;
    line-height: 1.15;
  }

  .logo-info h1 span { color: var(--orange); }

  .logo-info p {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  /* ── CARD ── */
  .card {
    width: 100%;
    background: rgba(255,255,255,.038);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px 28px 28px;
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    box-shadow:
      0 1px 0 rgba(255,255,255,.06) inset,
      0 28px 60px rgba(0,0,0,.45),
      0 0 60px rgba(236,103,38,.05);
  }

  .card-heading {
    font-size: 17px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
  }

  .card-sub {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 26px;
  }

  /* ── FIELDS ── */
  .field { margin-bottom: 16px; }

  .field label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: .6px;
    margin-bottom: 7px;
  }

  .input-wrap {
    position: relative;
  }

  /* Icon BEFORE input — uses absolute positioning */
  .input-wrap .input-icon {
    position: absolute;
    left: 13px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    pointer-events: none;
    transition: color .18s;
    font-size: 18px;
  }

  .input-wrap:focus-within .input-icon {
    color: var(--orange);
  }

  .input-wrap input {
    width: 100%;
    padding: 12px 42px 12px 42px; /* left: icon space, right: toggle space */
    background: rgba(255,255,255,.05);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color .18s, box-shadow .18s, background .18s;
    -webkit-appearance: none;
  }

  .input-wrap input::placeholder {
    color: rgba(255,255,255,.2);
    font-weight: 300;
  }

  .input-wrap input:focus {
    border-color: var(--border-focus);
    box-shadow: 0 0 0 3px rgba(236,103,38,.1);
    background: rgba(255,255,255,.07);
  }

  /* Toggle password button */
  .btn-toggle {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px;
    border-radius: 6px;
    color: var(--text-dim);
    display: flex; align-items: center;
    transition: color .18s, background .18s;
  }

  .btn-toggle:hover {
    color: var(--text-muted);
    background: rgba(255,255,255,.06);
  }

  .btn-toggle .icon { font-size: 18px; }

  /* ── SUBMIT BUTTON ── */
  .btn-submit {
    width: 100%;
    margin-top: 8px;
    padding: 13px 20px;
    background: linear-gradient(135deg, #f07830, var(--orange-dark));
    color: #fff;
    border: none;
    border-radius: 10px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    box-shadow: 0 4px 20px var(--orange-glow);
    transition: transform .15s, box-shadow .15s, opacity .15s;
    position: relative;
    overflow: hidden;
  }

  .btn-submit::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(255,255,255,.12) 0%, transparent 50%);
  }

  .btn-submit:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 8px 28px var(--orange-glow);
  }

  .btn-submit:active:not(:disabled) {
    transform: scale(.99);
  }

  .btn-submit:disabled {
    opacity: .6;
    cursor: not-allowed;
  }

  .btn-submit .icon { font-size: 20px; }

  /* ── SPINNER ── */
  .spin {
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: rotate .7s linear infinite;
    display: none;
    flex-shrink: 0;
  }

  @keyframes rotate { to { transform: rotate(360deg); } }

  /* ── ERROR ── */
  .alert {
    display: none;
    margin-top: 14px;
    padding: 11px 14px;
    border-radius: 10px;
    font-size: 13px;
    align-items: flex-start;
    gap: 9px;
    animation: slideIn .2s ease both;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .alert.error {
    background: var(--err-bg);
    border: 1px solid var(--err-border);
    color: var(--err-text);
  }

  .alert.show { display: flex; }
  .alert .icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
  .alert a { color: var(--orange); font-weight: 500; text-decoration: none; }
  .alert a:hover { text-decoration: underline; }

  /* ── DIVIDER ── */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 22px 0 16px;
  }

  /* ── SUPPORT ROW ── */
  .support {
    text-align: center;
    font-size: 12.5px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .support a {
    color: var(--orange);
    font-weight: 500;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 3px;
    transition: opacity .15s;
  }

  .support a:hover { opacity: .75; }
  .support a .icon { font-size: 15px; }

  /* ── FOOTER ── */
  .footer {
    font-size: 11px;
    color: rgba(255,255,255,.16);
    text-align: center;
    letter-spacing: .2px;
  }

  /* ── SHAKE ANIMATION ── */
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%      { transform: translateX(-7px); }
    40%      { transform: translateX(7px); }
    60%      { transform: translateX(-4px); }
    80%      { transform: translateX(4px); }
  }
</style>
</head>
<body>

<div class="wrapper">

  <!-- LOGO -->
  <div class="logo">
    <div class="logo-box">
      <span class="icon">medical_services</span>
    </div>
    <div class="logo-info">
      <h1>Clinic<span>RC</span></h1>
      <p>Retorno Ativo de Pacientes</p>
    </div>
  </div>

  <!-- CARD -->
  <div class="card" id="loginCard">
    <p class="card-heading">Bem-vindo de volta 👋</p>
    <p class="card-sub">Entre com suas credenciais para acessar o painel</p>

    <form id="loginForm" onsubmit="handleLogin(event)" novalidate>

      <!-- USUÁRIO -->
      <div class="field">
        <label for="username">Usuário</label>
        <div class="input-wrap">
          <span class="icon input-icon">person</span>
          <input
            type="text"
            id="username"
            placeholder="Seu usuário de acesso"
            autocomplete="username"
            spellcheck="false"
            autocapitalize="none"
          />
        </div>
      </div>

      <!-- SENHA -->
      <div class="field">
        <label for="password">Senha</label>
        <div class="input-wrap">
          <span class="icon input-icon">lock</span>
          <input
            type="password"
            id="password"
            placeholder="Sua senha"
            autocomplete="current-password"
          />
          <button
            type="button"
            class="btn-toggle"
            id="togglePass"
            onclick="togglePassword()"
            title="Mostrar/ocultar senha"
          >
            <span class="icon" id="eyeIcon">visibility</span>
          </button>
        </div>
      </div>

      <!-- SUBMIT -->
      <button class="btn-submit" type="submit" id="btnLogin">
        <span class="icon" id="btnIcon">login</span>
        <div class="spin" id="spinner"></div>
        <span id="btnTxt">Entrar</span>
      </button>

      <!-- ERRO -->
      <div class="alert error" id="errMsg" role="alert">
        <span class="icon">error</span>
        <div id="errTxt">Usuário ou senha incorretos.</div>
      </div>

    </form>

    <div class="divider"></div>

    <div class="support">
      <span>Precisa de ajuda?</span>
      <a href="https://wa.me/5581986544577" id="supportLink" target="_blank" rel="noopener">
        <span class="icon">chat</span>
        Falar com suporte
      </a>
    </div>
  </div>

  <p class="footer">ClinicRC © 2025 — Plataforma de Retorno Ativo</p>

</div>

<script>
  // ── Redireciona se já logado ──
  (function () {
    if (localStorage.getItem('clinicrc_token')) {
      window.location.href = 'app.html';
    }
  })();

  // ── Toggle de senha ──
  let passVisible = false;
  function togglePassword() {
    passVisible = !passVisible;
    const input = document.getElementById('password');
    const icon  = document.getElementById('eyeIcon');
    input.type  = passVisible ? 'text' : 'password';
    icon.textContent = passVisible ? 'visibility_off' : 'visibility';
  }

  // ── Carrega link de suporte do backend ──
  async function loadSupportLink() {
    try {
      const res = await fetch(window.location.origin + '/auth/support');
      if (res.ok) {
        const data = await res.json();
        if (data.whatsapp) {
          document.getElementById('supportLink').href = data.whatsapp;
        }
      }
    } catch (_) {}
  }
  loadSupportLink();

  // ── Login ──
  async function handleLogin(e) {
    e.preventDefault();

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('btnLogin');
    const spinner  = document.getElementById('spinner');
    const btnIcon  = document.getElementById('btnIcon');
    const btnTxt   = document.getElementById('btnTxt');
    const errMsg   = document.getElementById('errMsg');
    const errTxt   = document.getElementById('errTxt');
    const card     = document.getElementById('loginCard');

    // Validação básica
    if (!username || !password) {
      errTxt.textContent = 'Preencha o usuário e a senha.';
      errMsg.classList.add('show');
      return;
    }

    // Estado: carregando
    btn.disabled = true;
    spinner.style.display = 'block';
    btnIcon.style.display = 'none';
    btnTxt.textContent = 'Entrando...';
    errMsg.classList.remove('show');

    try {
      const res = await fetch(window.location.origin + '/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });

      const data = await res.json();

      if (!res.ok) {
        // Mostra erro
        let html = data.error || 'Credenciais inválidas.';
        if (data.support) {
          document.getElementById('supportLink').href = data.support;
        }
        errTxt.innerHTML = html;
        errMsg.classList.add('show');

        // Shake no card
        card.style.animation = 'none';
        card.offsetHeight;
        card.style.animation = 'shake .4s ease';
        return;
      }

      // Salva sessão
      localStorage.setItem('clinicrc_token',  data.token);
      localStorage.setItem('clinicrc_clinic', data.clinic_name);
      localStorage.setItem('clinicrc_user',   data.username);

      // Feedback de sucesso antes de redirecionar
      btnIcon.textContent  = 'check_circle';
      btnIcon.style.display = '';
      spinner.style.display = 'none';
      btnTxt.textContent = 'Bem-vindo!';
      btn.style.background = 'linear-gradient(135deg,#22c55e,#16a34a)';

      setTimeout(() => { window.location.href = 'app.html'; }, 600);

    } catch (err) {
      errTxt.textContent = 'Não foi possível conectar ao servidor. Verifique sua internet.';
      errMsg.classList.add('show');
      resetBtn();
    }

    function resetBtn() {
      btn.disabled = false;
      spinner.style.display = 'none';
      btnIcon.style.display = '';
      btnTxt.textContent = 'Entrar';
    }
  }
</script>
</body>
</html>
